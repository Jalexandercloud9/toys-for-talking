<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toys for Talking — Speech Therapy Services</title>
  <meta name="description" content="Play-based speech and language therapy for children by Jasmine Alexander, CCC-SLP. Summer camps, evaluations, and personalized therapy." />
  <meta name="theme-color" content="#1E4D8C" />

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣️</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stripe.js (required for payments — loads asynchronously) -->
  <script src="https://js.stripe.com/v3/" async></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Stripe publishable key — replace with your real key -->
  <!-- <script>window.STRIPE_PUBLISHABLE_KEY = 'pk_live_YOUR_KEY_HERE';</script> -->
</head>
<body>
  <div id="app">
    <!-- Navbar (re-rendered on each route change) -->
    <div id="navbar"></div>

    <!-- Page content (swapped by router) -->
    <main id="page-content">
      <!-- Initial loading indicator -->
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </main>

    <!-- Footer (static) -->
    <div id="footer-root"></div>
  </div>

  <!-- ===================== DATA ===================== -->
  <script src="js/data.js"></script>

  <!-- ===================== COMPONENTS ===================== -->
  <script src="js/components/navbar.js"></script>
  <script src="js/components/footer.js"></script>

  <!-- ===================== PAGES ===================== -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/about.js"></script>
  <script src="js/pages/book-camp.js"></script>
  <script src="js/pages/book-evaluation.js"></script>
  <script src="js/pages/payment.js"></script>
  <script src="js/pages/confirmation.js"></script>

  <!-- ===================== ROUTER ===================== -->
  <script src="js/app.js"></script>

  <!-- Render footer (static across all pages) -->
  <script>
    document.getElementById('footer-root').innerHTML = renderFooter();
  </script>
</body>
</html>
